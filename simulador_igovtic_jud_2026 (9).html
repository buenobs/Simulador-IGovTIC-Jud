const MATURIDADE = [
  {nivel:"Baixo",min:0,max:40,cor:"#ef4444",bg:"#fef2f2"},
  {nivel:"Satisfatório",min:40,max:70,cor:"#f59e0b",bg:"#fffbeb"},
  {nivel:"Aprimorado",min:70,max:90,cor:"#3b82f6",bg:"#eff6ff"},

// ═══════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════
let tipoOrgao="geral", secaoAtiva=0;
let respostasItens={}, respostasAN={}, anotacoes={};
let sessoesSalvas=[], nomeSessaoAtual="";

// ═══════════════════════════════════════════════════
// CÁLCULO
// ═══════════════════════════════════════════════════
const getPeso=p=>tipoOrgao==="TRT"?p.peso.TRT:tipoOrgao==="TRE"?p.peso.TRE:p.peso.geral;
const calcNFP=p=>Math.min(100,p.itens.reduce((s,item)=>{
  const v=respostasItens[item.id];
  return s+(item.tipo==="lista"?(v!==undefined?(item.opcoes[v]?.v||0):0):(v==="sim"?item.sim:0));
},0));
const calcNFT=t=>PERGUNTAS.filter(p=>p.tema===t.id).reduce((s,p)=>s+calcNFP(p)*getPeso(p)/100,0);
const calcNFTIC=()=>TEMAS.reduce((s,t)=>s+calcNFT(t),0)/8;
const calcNFAN=()=>PERGUNTAS_AN.reduce((s,p)=>{const v=respostasAN[p.id];return s+(v!==undefined?(p.opcoes[v]?.v||0):0)*p.peso/100;},0);
const calcIGov=()=>calcNFTIC()*0.9+calcNFAN()*0.1;
const getNivel=n=>MATURIDADE.find(m=>n>=m.min&&n<m.max)||MATURIDADE[MATURIDADE.length-1];
const corNota=n=>n>=70?"#10b981":n>=40?"#f59e0b":"#ef4444";
const calcProgresso=()=>{
  const total=PERGUNTAS.reduce((s,p)=>s+p.itens.length,0)+PERGUNTAS_AN.length;
  return Math.round((Object.keys(respostasItens).length+Object.keys(respostasAN).length)/total*100);
};

// ═══════════════════════════════════════════════════
// STORAGE (localStorage)
// ═══════════════════════════════════════════════════
const SK="igovtic-sessoes-2026";
function carregarSessoes(){try{sessoesSalvas=JSON.parse(localStorage.getItem(SK)||"[]");}catch(e){sessoesSalvas=[];}}
function persistir(){localStorage.setItem(SK,JSON.stringify(sessoesSalvas));}
function salvarSessao(nome){
  if(!nome.trim()){showToast("Digite um nome para a sessão!");return;}
  const igov=calcIGov(),nv=getNivel(igov);
  const nova={id:Date.now(),nome:nome.trim(),
    data:new Date().toLocaleDateString("pt-BR"),hora:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),
    tipoOrgao,respostasItens:{...respostasItens},respostasAN:{...respostasAN},anotacoes:{...anotacoes},
    nota:igov.toFixed(2),nivel:nv.nivel,cor:nv.cor,progresso:calcProgresso()};
  const idx=sessoesSalvas.findIndex(s=>s.nome===nova.nome);
  if(idx>=0)sessoesSalvas[idx]=nova;else sessoesSalvas.unshift(nova);
  persistir(); nomeSessaoAtual=nova.nome;
  showToast('"'+nova.nome+'" salva!'); render();
}
function excluirSessao(id){sessoesSalvas=sessoesSalvas.filter(s=>s.id!==id);persistir();showToast("Sessão excluída.");render();}
function carregarSessaoNaMemoria(id){
  const s=sessoesSalvas.find(x=>x.id===id); if(!s)return;
  tipoOrgao=s.tipoOrgao; respostasItens={...s.respostasItens}; respostasAN={...s.respostasAN}; anotacoes={...(s.anotacoes||{})};
  nomeSessaoAtual=s.nome; secaoAtiva=1;
  showToast('"'+s.nome+'" carregada!'); render();
}
function exportarSessoes() {
  if(sessoesSalvas.length===0){showToast("Nenhuma sessão para exportar.");return;}
  const dados = JSON.stringify(sessoesSalvas, null, 2);
  const blob = new Blob([dados], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "sessoes_igovtic_jud_2026.json";
  a.click();
  URL.revokeObjectURL(url);
  showToast("✅ " + sessoesSalvas.length + " sessão(ões) exportada(s)!");
}

function importarSessoes(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const importadas = JSON.parse(e.target.result);
      if(!Array.isArray(importadas)) throw new Error("Formato inválido");
      let novas = 0, atualizadas = 0;
      importadas.forEach(s => {
        // garantir que tem id único
        if(!s.id) s.id = Date.now() + Math.random();
        const idx = sessoesSalvas.findIndex(x => x.nome === s.nome);
        if(idx >= 0) { sessoesSalvas[idx] = s; atualizadas++; }
        else { sessoesSalvas.unshift(s); novas++; }
      });
      persistir();
      showToast("✅ " + novas + " nova(s) e " + atualizadas + " atualizada(s)!");
      render();
    } catch(err) {
      showToast("❌ Arquivo inválido. Use um .json exportado por este simulador.");
    }
    input.value = "";
  };
  reader.readAsText(file);
}

function setAnotacao(id, val) {
  if(val.trim()) anotacoes[id] = val;
  else delete anotacoes[id];
  // Marca o textarea visualmente
  const el = document.getElementById('nota_' + id.replace(/\./g,'_'));
  if(el) el.classList.toggle('filled', !!val.trim());
}

function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2800);}

function navBtns(prev,next){

function render(){

  else if(secaoAtiva===9)renderAN(c);

function renderItem(item){
  const evBadge = item.ev ? '<span class="ev-badge">📎 Evidência exigida</span>' : '';
  let h='<div class="item"><div class="item-desc"><span class="item-id">'+item.id+'</span>'+item.desc+evBadge+'</div>';

        '<input type="radio" name="'+item.id+'" '+(sel?"checked":"")+'><span class="opcao-label">'+op.l+'</span>'+
        '<span class="opcao-pts '+(op.v===0?"zero":"")+'">'+op.v+'pts</span></label>';});
  } else {

      '<label class="sn-btn '+(cur==="sim"?"sel-sim":"")+'" onclick="respostasItens[\''+item.id+'\']=\'sim\';render()">'+

      '<div class="mat-marker" style="left:'+Math.min(99,igov)+'%"></div>'+
    '</div>'+
    '<div style="display:flex;justify-content:space-between;font-size:10px;color:#888;margin-top:3px"><span>0</span><span>40</span><span>70</span><span>90</span><span>100</span></div>'+
  '</div>'+
  '<div class="card" style="margin-bottom:14px"><div style="font-weight:bold;margin-bottom:12px;font-size:13px">Por Tema</div>';
  TEMAS.forEach((t,i)=>{const n=calcNFT(t),co=corNota(n);
    h+='<div class="tema-row"><div class="tema-row-header"><span>T'+(i+1)+' – '+t.nome+'</span><span style="font-weight:bold;color:'+co+'">'+n.toFixed(2)+'</span></div>'+
    '<div class="bar-container"><div class="bar-fill" style="width:'+Math.min(100,n)+'%;background:'+co+'"></div></div></div>';});
  h+='</div><div class="card" style="margin-bottom:14px"><div style="font-weight:bold;margin-bottom:10px;font-size:13px">Por Pergunta (TIC)</div><div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:10px">Nota obtida em cada pergunta (0–100). Peso da pergunta no tema indicado abaixo.</div><div class="nota-grid">';
  PERGUNTAS.forEach(p=>{const pe=getPeso(p),n=calcNFP(p),co=pe===0?"#ccc":corNota(n);
    h+='<div class="nota-cell" style="border-color:'+co+'"><div class="nota-cell-id">'+p.id+'</div><div class="nota-cell-val" style="color:'+co+'">'+(pe===0?"N/A":n.toFixed(0))+'</div><div class="nota-cell-peso">peso '+pe+'%</div></div>';});
  h+='</div></div><div style="display:flex;gap:10px;flex-wrap:wrap">'+
    '<button class="btn btn-secondary" onclick="secaoAtiva=0;render()">← Config</button>'+
    '<button class="btn btn-gold" onclick="secaoAtiva=11;render()">💾 Sessões</button>'+
    '<button class="btn btn-secondary" onclick="if(confirm(\'Limpar tudo?\')){respostasItens={};respostasAN={};anotacoes={};nomeSessaoAtual=\'\';secaoAtiva=1;render();}">↺ Reiniciar</button>'+
  '</div>';
  c.innerHTML=h;
}

function renderSessoes(c){
  let h='<h2 style="font-size:22px;margin-bottom:8px">💾 Sessões Salvas</h2>'+
  '<p style="color:#555;margin-bottom:14px;font-size:13px">Respostas salvas no seu navegador. Use <strong>Exportar</strong> para salvar um arquivo .json e <strong>Importar</strong> para carregar em outro computador.</p>'+
  '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;padding:14px 16px;background:var(--color-background-secondary);border:1px solid var(--color-border-tertiary);border-radius:10px;align-items:center">'+
    '<span style="font-size:13px;font-weight:bold;color:var(--color-text-primary);margin-right:4px">Transferir sessões:</span>'+
    '<button class="btn btn-primary" onclick="exportarSessoes()">⬇ Exportar .json</button>'+
    '<label class="import-label">⬆ Importar .json<input type="file" accept=".json" style="display:none" onchange="importarSessoes(this)"></label>'+
    '<span style="font-size:11px;color:var(--color-text-secondary);margin-left:4px">O arquivo .json pode ser aberto em qualquer computador com este simulador.</span>'+
  '</div>'+
  saveBanner();
  if(sessoesSalvas.length===0){
    h+='<div class="empty-state"><div style="font-size:40px;margin-bottom:12px">📭</div>Nenhuma sessão salva ainda.<br>Preencha respostas e use a barra verde acima para salvar.</div>';
  } else {
    h+='<div style="font-weight:bold;margin-bottom:10px;font-size:13px;color:#555">'+sessoesSalvas.length+' sessão(ões)</div>';
    sessoesSalvas.forEach(s=>{
      const nomeSafe=s.nome.replace(/'/g,"\\'").replace(/"/g,"&quot;");
      h+='<div class="sessao-card">'+
        '<div style="flex:1"><div class="sessao-nome">'+s.nome+'</div>'+
        '<div class="sessao-meta">'+s.tipoOrgao.toUpperCase()+' · '+s.data+' '+s.hora+' · '+s.progresso+'% preenchido</div></div>'+
        '<div class="sessao-nota" style="color:'+s.cor+'">'+s.nota+'</div>'+
        '<div style="font-size:11px;color:'+s.cor+';font-weight:bold;min-width:70px;text-align:center">'+s.nivel+'</div>'+
        '<button class="btn btn-primary" onclick="carregarSessaoNaMemoria('+s.id+')">📂 Carregar</button>'+
        '<button class="btn btn-red" onclick="if(confirm(\'Excluir &quot;'+nomeSafe+'&quot;?\')){excluirSessao('+s.id+');}">🗑</button>'+
      '</div>';
    });
  }
  h+='<div style="margin-top:12px"><button class="btn btn-secondary" onclick="secaoAtiva=0;render()">← Voltar</button></div>';
  c.innerHTML=h;
}

// INIT
carregarSessoes();
render();
</script>
</body>
</html>
