// ESTADO
// ═══════════════════════════════════════════════════
let tipoOrgao="geral", secaoAtiva=0;
let respostasItens={}, respostasAN={};
let sessoesSalvas=[], nomeSessaoAtual="";

// ═══════════════════════════════════════════════════
// CÁLCULO
// ═══════════════════════════════════════════════════
const getPeso=p=>tipoOrgao==="TRT"?p.peso.TRT:tipoOrgao==="TRE"?p.peso.TRE:p.peso.geral;
const calcNFP=p=>Math.min(100,p.itens.reduce((s,item)=>{
  const v=respostasItens[item.id];
  return s+(item.tipo==="lista"?(v!==undefined?(item.opcoes[v]?.v||0):0):(v==="sim"?item.sim:0));
},0));
const calcNFT=t=>PERGUNTAS.filter(p=>p.tema===t.id).reduce((s,p)=>s+calcNFP(p)*getPeso(p)/100,0);
const calcNFTIC=()=>TEMAS.reduce((s,t)=>s+calcNFT(t),0)/8;
const calcNFAN=()=>PERGUNTAS_AN.reduce((s,p)=>{const v=respostasAN[p.id];return s+(v!==undefined?(p.opcoes[v]?.v||0):0)*p.peso/100;},0);
const calcIGov=()=>calcNFTIC()*0.9+calcNFAN()*0.1;
const getNivel=n=>MATURIDADE.find(m=>n>=m.min&&n<m.max)||MATURIDADE[MATURIDADE.length-1];
const corNota=n=>n>=70?"#10b981":n>=40?"#f59e0b":"#ef4444";
const calcProgresso=()=>{
  const total=PERGUNTAS.reduce((s,p)=>s+p.itens.length,0)+PERGUNTAS_AN.length;
  return Math.round((Object.keys(respostasItens).length+Object.keys(respostasAN).length)/total*100);
};

// ═══════════════════════════════════════════════════
// STORAGE (localStorage)
// ═══════════════════════════════════════════════════
const SK="igovtic-sessoes-2026";
function carregarSessoes(){try{sessoesSalvas=JSON.parse(localStorage.getItem(SK)||"[]");}catch(e){sessoesSalvas=[];}}
function persistir(){localStorage.setItem(SK,JSON.stringify(sessoesSalvas));}
function salvarSessao(nome){
  if(!nome.trim()){showToast("Digite um nome para a sessão!");return;}
  const igov=calcIGov(),nv=getNivel(igov);
  const nova={id:Date.now(),nome:nome.trim(),
    data:new Date().toLocaleDateString("pt-BR"),hora:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),
    tipoOrgao,respostasItens:{...respostasItens},respostasAN:{...respostasAN},
    nota:igov.toFixed(2),nivel:nv.nivel,cor:nv.cor,progresso:calcProgresso()};
  const idx=sessoesSalvas.findIndex(s=>s.nome===nova.nome);
  if(idx>=0)sessoesSalvas[idx]=nova;else sessoesSalvas.unshift(nova);
  persistir(); nomeSessaoAtual=nova.nome;
  showToast('"'+nova.nome+'" salva!'); render();
}
function excluirSessao(id){sessoesSalvas=sessoesSalvas.filter(s=>s.id!==id);persistir();showToast("Sessão excluída.");render();}
function carregarSessaoNaMemoria(id){
  const s=sessoesSalvas.find(x=>x.id===id); if(!s)return;
  tipoOrgao=s.tipoOrgao; respostasItens={...s.respostasItens}; respostasAN={...s.respostasAN};
  nomeSessaoAtual=s.nome; secaoAtiva=1;
  showToast('"'+s.nome+'" carregada!'); render();
}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2800);}

  const p=calcProgresso();
  document.getElementById("progFill").style.width=p+"%";
  document.getElementById("progPct").textContent=p+"%";
}
function buildNav(){
  const nav=document.getElementById("navBar");nav.innerHTML="";
  const labels=["Configuração","T1","T2","T3","T4","T5","T6","T7","T8","Área Negócio","Resultado","Sessões"];
  labels.forEach((s,i)=>{
    const btn=document.createElement("button");
    btn.className="nav-btn"+(secaoAtiva===i?" active":"");
    btn.textContent=i>=1&&i<=8?("T"+i+" "+TEMAS[i-1].nome.substring(0,10)+"…"):
                   i===11?"💾 "+s:i===10?"📊 "+s:i===9?"🏢 "+s:"⚙ "+s;
    btn.onclick=(idx=>()=>{secaoAtiva=idx;render();})(i);
    nav.appendChild(btn);
  });
}
function saveBanner(){
  return '<div class="save-bar">'+
    '<span style="font-size:13px;font-weight:bold;color:#065f46">💾 Salvar:</span>'+
    '<input id="inputNomeSessao" type="text" placeholder="Nome da sessão" value="'+nomeSessaoAtual+'" onkeydown="if(event.key===\'Enter\'){salvarSessao(this.value);}">'+
    '<button class="btn btn-green" onclick="salvarSessao(document.getElementById(\'inputNomeSessao\').value)">Salvar</button>'+
    (nomeSessaoAtual?'<span class="autosave-pill">✓ '+nomeSessaoAtual+'</span>':'')+
  '</div>';
}
function navBtns(prev,next){
  return '<div class="nav-actions">'+
    '<button class="btn btn-secondary" onclick="secaoAtiva='+prev+';render()">← Anterior</button>'+
    '<button class="btn btn-primary" onclick="secaoAtiva='+next+';render()">Próximo →</button>'+
  '</div>';
}
function render(){
  updateHeader();buildNav();const c=document.getElementById("mainContent");
  if(secaoAtiva===0)renderConfig(c);
  else if(secaoAtiva>=1&&secaoAtiva<=8)renderTema(c,secaoAtiva-1);
  else if(secaoAtiva===9)renderAN(c);
  else if(secaoAtiva===10)renderResultado(c);
  else renderSessoes(c);
}

function renderConfig(c){
  c.innerHTML='<h2 style="font-size:22px;margin-bottom:8px">Configuração do Simulador</h2>'+
  '<p style="color:#555;margin-bottom:18px;line-height:1.6">Simulador do <strong>iGovTIC-JUD 2026</strong> — Manual CNJ versão 23/02/2026. Dados corrigidos e validados.</p>'+
  saveBanner()+
  '<div class="card" style="margin-bottom:18px"><div style="font-weight:bold;margin-bottom:12px">Tipo de Órgão</div>'+
  [{val:"geral",label:"Demais Órgãos",desc:"Conselhos, Tribunais Superiores, TJs, etc."},
   {val:"TRT",label:"TRT – Tribunal Regional do Trabalho",desc:"P8 não se aplica; pesos redistribuídos no Tema 3"},
   {val:"TRE",label:"TRE – Tribunal Regional Eleitoral",desc:"P11 não se aplica; pesos redistribuídos no Tema 3"}]
  .map(op=>'<label class="tipo-radio '+(tipoOrgao===op.val?"sel":"")+'" onclick="tipoOrgao=\''+op.val+'\';render()">'+
    '<input type="radio" name="tipo" '+(tipoOrgao===op.val?"checked":"")+'>'+
    '<div><div style="font-weight:bold;font-size:14px">'+op.label+'</div>'+
    '<div style="font-size:12px;color:#888;margin-top:2px">'+op.desc+'</div></div></label>').join("")+
  '</div>'+
  '<div class="formula-box">'+
    '<div style="color:#c9a84c;font-weight:bold;margin-bottom:6px;font-size:11px">FÓRMULA</div>'+
    '<div><span class="acc">iGovTIC-JUD</span> = (NF-TIC × 0,9) + (NF-AN × 0,1)</div>'+
    '<div class="dim">NF-TIC = (NFT1+…+NFT8)/8 · NFT = Σ(NFP×Peso) · NFP = min(100, Σ notas dos itens)</div>'+
  '</div>'+
  '<div style="display:flex;gap:10px;flex-wrap:wrap">'+
    '<button class="btn btn-primary" onclick="secaoAtiva=1;render()">Iniciar Avaliação →</button>'+
    '<button class="btn btn-secondary" onclick="secaoAtiva=11;render()">💾 Sessões ('+sessoesSalvas.length+')</button>'+
    '<button class="btn btn-secondary" onclick="if(confirm(\'Limpar todas as respostas?\')){respostasItens={};respostasAN={};nomeSessaoAtual=\'\';render();}">↺ Limpar</button>'+
  '</div>';
}

function renderItem(item){
  let h='<div class="item"><div class="item-desc"><span class="item-id">'+item.id+'</span>'+item.desc+'</div>';
  if(item.tipo==="lista"){
    item.opcoes.forEach((op,i)=>{const sel=respostasItens[item.id]===i;
      h+='<label class="opcao '+(sel?"selected":"")+'" onclick="respostasItens[\''+item.id+'\']='+i+';render()">'+
        '<input type="radio" name="'+item.id+'" '+(sel?"checked":"")+'><span class="opcao-label">'+op.l+'</span>'+
        '<span class="opcao-pts '+(op.v===0?"zero":"")+'">'+op.v+'pts</span></label>';});
  } else {
    const cur=respostasItens[item.id];
    h+='<div class="simnao-row">'+
      '<label class="sn-btn '+(cur==="sim"?"sel-sim":"")+'" onclick="respostasItens[\''+item.id+'\']=\'sim\';render()">'+
        '<div style="display:flex;align-items:center;gap:5px"><input type="radio" name="'+item.id+'" '+(cur==="sim"?"checked":"")+'><span class="sn-sim">✓ Sim</span></div>'+
        '<span style="font-size:11px;color:#888">'+item.sim+'pts</span></label>'+
      '<label class="sn-btn '+(cur==="nao"?"sel-nao":"")+'" onclick="respostasItens[\''+item.id+'\']=\'nao\';render()">'+
        '<div style="display:flex;align-items:center;gap:5px"><input type="radio" name="'+item.id+'" '+(cur==="nao"?"checked":"")+'><span class="sn-nao">✗ Não</span></div>'+
        '<span style="font-size:11px;color:#888">0pts</span></label></div>';
  }
  return h+'</div>';
}

function renderTema(c,idx){
  const t=TEMAS[idx],ps=PERGUNTAS.filter(p=>p.tema===t.id),nft=calcNFT(t);
  let h=saveBanner()+
  '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">'+
    '<span class="tag tag-dark">Tema '+(idx+1)+'</span>'+
    '<span style="background:#fff;border:1px solid #e5e0d8;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:bold">'+
    'NFT: <span style="color:'+corNota(nft)+'">'+nft.toFixed(2)+'</span></span>'+
  '</div><h2 style="font-size:19px;margin-bottom:16px">'+t.nome+'</h2>';
  ps.forEach(p=>{
    const peso=getPeso(p),na=peso===0,nfp=calcNFP(p);
    h+='<div class="card" style="opacity:'+(na?.55:1)+'">'+
      '<div class="pergunta-header"><div style="flex:1">'+
        '<div style="margin-bottom:4px"><span class="tag tag-dark">'+p.id+'</span><span class="tag tag-light">Peso: '+peso+'%</span>'+(na?'<span class="tag tag-na">N/A</span>':"")+
        (p.notaTRT&&tipoOrgao==="TRT"?'</div><div style="font-size:11px;color:#f59e0b;margin-top:3px">⚠ '+p.notaTRT:'')+(p.notaTRE&&tipoOrgao==="TRE"?'</div><div style="font-size:11px;color:#f59e0b;margin-top:3px">⚠ '+p.notaTRE:'')+'</div>'+
        '<div class="pergunta-titulo">'+p.titulo+'</div></div>'+
      '<div class="nfp-box"><div class="nfp-label">NFP</div><div class="nfp-val" style="color:'+corNota(nfp)+'">'+nfp.toFixed(1)+'</div></div></div>';
    if(!na) p.itens.forEach(item=>{h+=renderItem(item);});
    h+='</div>';
  });
  h+=navBtns(idx===0?0:idx, idx===7?9:idx+2);
  c.innerHTML=h;
}

function renderAN(c){
  const nfan=calcNFAN();
  let h=saveBanner()+
  '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">'+
    '<span class="tag tag-blue">Seção 2</span>'+
    '<span style="background:#fff;border:1px solid #e5e0d8;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:bold">'+
    'NF-AN: <span style="color:'+corNota(nfan)+'">'+nfan.toFixed(2)+'</span></span>'+
  '</div><h2 style="font-size:19px;margin-bottom:14px">Avaliação da Área de Negócio</h2>';
  PERGUNTAS_AN.forEach(p=>{
    const cur=respostasAN[p.id],nota=cur!==undefined?(p.opcoes[cur]?.v||0):null;
    h+='<div class="card"><div class="pergunta-header"><div style="flex:1">'+
      '<div style="margin-bottom:4px"><span class="tag tag-blue">'+p.id+'</span><span class="tag tag-light">Peso: '+p.peso+'%</span></div>'+
      '<div class="pergunta-titulo">'+p.titulo+'</div></div>'+
      '<div class="nfp-box"><div class="nfp-label">Nota</div><div class="nfp-val" style="color:'+(nota!==null?corNota(nota):"#ccc")+'">'+(nota!==null?nota:"—")+'</div></div></div>';
    p.opcoes.forEach((op,i)=>{const sel=respostasAN[p.id]===i;
      h+='<label class="opcao '+(sel?"selected":"")+'" onclick="respostasAN[\''+p.id+'\']='+i+';render()">'+
        '<input type="radio" name="'+p.id+'" '+(sel?"checked":"")+'><span class="opcao-label">'+op.l+'</span>'+
        '<span class="opcao-pts '+(op.v===0?"zero":"")+'">'+op.v+'pts</span></label>';});
    h+='</div>';});
  h+=navBtns(8,10);c.innerHTML=h;
}

function renderResultado(c){
  const igov=calcIGov(),nftic=calcNFTIC(),nfan=calcNFAN(),nv=getNivel(igov);
  let h=saveBanner()+
  '<h2 style="font-size:22px;margin-bottom:16px">Resultado da Avaliação</h2>'+
  '<div class="resultado-box" style="background:'+nv.bg+';border-color:'+nv.cor+'">'+
    '<div style="font-size:11px;letter-spacing:3px;text-transform:uppercase;color:'+nv.cor+';margin-bottom:6px">iGovTIC-JUD 2026</div>'+
    '<div class="nota-grande" style="color:'+nv.cor+'">'+igov.toFixed(2)+'</div>'+
    '<div class="nivel-label" style="color:'+nv.cor+'">Nível de Maturidade: '+nv.nivel+'</div>'+
    '<div style="display:flex;gap:12px;justify-content:center;margin-top:12px;flex-wrap:wrap">'+
      '<span class="nf-pill">NF-TIC: <strong>'+nftic.toFixed(2)+'</strong> <span style="color:#888;font-size:11px">(90%)</span></span>'+
      '<span class="nf-pill">NF-AN: <strong>'+nfan.toFixed(2)+'</strong> <span style="color:#888;font-size:11px">(10%)</span></span>'+
    '</div></div>'+
  '<div class="card" style="margin-bottom:14px">'+
    '<div style="font-weight:bold;margin-bottom:10px;font-size:13px">Posição na escala de maturidade</div>'+
    '<div class="maturidade-bar">'+
      '<div style="position:absolute;left:0;top:0;width:40%;height:100%;background:#ef4444"></div>'+
      '<div style="position:absolute;left:40%;top:0;width:30%;height:100%;background:#f59e0b"></div>'+
      '<div style="position:absolute;left:70%;top:0;width:20%;height:100%;background:#3b82f6"></div>'+
      '<div style="position:absolute;left:90%;top:0;width:10%;height:100%;background:#10b981"></div>'+
      '<div class="mat-marker" style="left:'+Math.min(99,igov)+'%"></div>'+
    '</div>'+
    '<div style="display:flex;justify-content:space-between;font-size:10px;color:#888;margin-top:3px"><span>0</span><span>40</span><span>70</span><span>90</span><span>100</span></div>'+
  '</div>'+
  '<div class="card" style="margin-bottom:14px"><div style="font-weight:bold;margin-bottom:12px;font-size:13px">Por Tema</div>';
  TEMAS.forEach((t,i)=>{const n=calcNFT(t),co=corNota(n);
    h+='<div class="tema-row"><div class="tema-row-header"><span>T'+(i+1)+' – '+t.nome+'</span><span style="font-weight:bold;color:'+co+'">'+n.toFixed(2)+'</span></div>'+
    '<div class="bar-container"><div class="bar-fill" style="width:'+Math.min(100,n)+'%;background:'+co+'"></div></div></div>';});
  h+='</div><div class="card" style="margin-bottom:14px"><div style="font-weight:bold;margin-bottom:10px;font-size:13px">Por Pergunta (TIC)</div><div class="nota-grid">';
  PERGUNTAS.forEach(p=>{const pe=getPeso(p),n=calcNFP(p),co=pe===0?"#ccc":corNota(n);
    h+='<div class="nota-cell" style="border-color:'+co+'"><div class="nota-cell-id">'+p.id+'</div><div class="nota-cell-val" style="color:'+co+'">'+(pe===0?"N/A":n.toFixed(0))+'</div><div class="nota-cell-peso">'+pe+'%</div></div>';});
  h+='</div></div><div style="display:flex;gap:10px;flex-wrap:wrap">'+
    '<button class="btn btn-secondary" onclick="secaoAtiva=0;render()">← Config</button>'+
    '<button class="btn btn-gold" onclick="secaoAtiva=11;render()">💾 Sessões</button>'+
    '<button class="btn btn-secondary" onclick="if(confirm(\'Limpar tudo?\')){respostasItens={};respostasAN={};nomeSessaoAtual=\'\';secaoAtiva=1;render();}">↺ Reiniciar</button>'+
  '</div>';
  c.innerHTML=h;
}

function renderSessoes(c){
  let h='<h2 style="font-size:22px;margin-bottom:8px">💾 Sessões Salvas</h2>'+
  '<p style="color:#555;margin-bottom:18px;font-size:13px">Respostas salvas no seu navegador (localStorage). Carregue qualquer sessão para continuar de onde parou.</p>'+
  saveBanner();
  if(sessoesSalvas.length===0){
    h+='<div class="empty-state"><div style="font-size:40px;margin-bottom:12px">📭</div>Nenhuma sessão salva ainda.<br>Preencha respostas e use a barra verde acima para salvar.</div>';
  } else {
    h+='<div style="font-weight:bold;margin-bottom:10px;font-size:13px;color:#555">'+sessoesSalvas.length+' sessão(ões)</div>';
    sessoesSalvas.forEach(s=>{
      const nomeSafe=s.nome.replace(/'/g,"\\'").replace(/"/g,"&quot;");
      h+='<div class="sessao-card">'+
        '<div style="flex:1"><div class="sessao-nome">'+s.nome+'</div>'+
        '<div class="sessao-meta">'+s.tipoOrgao.toUpperCase()+' · '+s.data+' '+s.hora+' · '+s.progresso+'% preenchido</div></div>'+
        '<div class="sessao-nota" style="color:'+s.cor+'">'+s.nota+'</div>'+
        '<div style="font-size:11px;color:'+s.cor+';font-weight:bold;min-width:70px;text-align:center">'+s.nivel+'</div>'+
        '<button class="btn btn-primary" onclick="carregarSessaoNaMemoria('+s.id+')">📂 Carregar</button>'+
        '<button class="btn btn-red" onclick="if(confirm(\'Excluir &quot;'+nomeSafe+'&quot;?\')){excluirSessao('+s.id+');}">🗑</button>'+
      '</div>';
    });
  }
  h+='<div style="margin-top:12px"><button class="btn btn-secondary" onclick="secaoAtiva=0;render()">← Voltar</button></div>';
  c.innerHTML=h;
}

// INIT
carregarSessoes();
render();
</script>
</body>
</html>
